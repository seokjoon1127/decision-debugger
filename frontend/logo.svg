<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mind Compass">
  <!-- cardinal tick marks -->
  <g stroke="#3E5C6E" stroke-width="6" stroke-linecap="round">
    <line x1="100" y1="13" x2="100" y2="25"/>
    <line x1="187" y1="100" x2="175" y2="100"/>
    <line x1="100" y1="187" x2="100" y2="175"/>
    <line x1="13" y1="100" x2="25" y2="100"/>
  </g>
  <!-- compass ring (doubles as a speech bubble) -->
  <circle cx="100" cy="100" r="70" fill="#ffffff" stroke="#3E5C6E" stroke-width="9"/>
  <!-- needle: blue (NE) + green (SW) -->
  <polygon points="142,58 83,117 117,83" fill="#87AEDC"/>
  <polygon points="58,142 117,83 83,117" fill="#8FBF9F"/>
  <!-- hub -->
  <circle cx="100" cy="100" r="13" fill="#ffffff" stroke="#3E5C6E" stroke-width="6"/>
  <!-- smiley -->
  <circle cx="89" cy="141" r="3.6" fill="#3E5C6E"/>
  <circle cx="111" cy="141" r="3.6" fill="#3E5C6E"/>
  <path d="M87 151 q13 11 26 0" fill="none" stroke="#3E5C6E" stroke-width="4.5" stroke-linecap="round"/>
  <!-- sparkle accents -->
  <g stroke-width="5" stroke-linecap="round">
    <line x1="152" y1="20" x2="152" y2="33" stroke="#F2C879"/>
    <line x1="168" y1="30" x2="178" y2="20" stroke="#8FBF9F"/>
    <line x1="172" y1="48" x2="185" y2="48" stroke="#87AEDC"/>
  </g>
</svg>
